<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Wire News | Article</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js" defer></script>
    <script src="js/article.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Daily Wire News homepage">
        <span class="brand-mark">DW</span>
        <span>Daily Wire News</span>
      </a>
      <nav class="main-nav" aria-label="News categories" id="category-nav"></nav>
    </header>

    <main>
      <article class="article-page" id="article-page"></article>

      <section class="content-band related-section" aria-labelledby="related-heading">
        <div class="section-heading">
          <div>
            <div class="section-kicker">Keep Reading</div>
            <h2 id="related-heading">Related News</h2>
          </div>
        </div>
        <div class="related-list" id="related-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Mock news app for browsing headlines, categories, and article pages.</p>
    </footer>
  </body>
</html>
